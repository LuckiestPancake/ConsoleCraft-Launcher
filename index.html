<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>ConsoleCraft Launcher</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>


    <div class="launcher-options-top">
            <div class="play-section bottom-section">
                <img src="media/logo-tempscaled.png" class="play-section-title" draggable="false">

                <div class="play-buttons">

                    <div class="button-wide" id="play-button">
                        <p>Play</p>
                    </div>

                    <a class="button-wide" href="https://discord.gg/He6JD39ZAN" target="_blank">
                        <p>Discord</p>
                    </a>

                    <a class="button-wide" href="https://github.com/LuckiestPancake/ConsoleCraft-Launcher" target="_blank">
                        <p>Github</p>
                    </a>

                </div>

            </div>
    </div>




        
        <div class="launcher-options-bottom">

            <div class="bottom-section player-profile">
                <div class="button-wide button-medium" id="import-skin-button">
                    <p>Import Skin</p>
                </div>
                <input type="text" class="input-wide" placeholder="Player"> 
                <div class="button-wide button-medium" id="save-profile-button">
                    <p>Save</p>
                </div>
            </div>

            <div class="filler">
                
            </div>

            <div class="playtime-section bottom-section">
                <p class="playtime-section-title">Release</p>
                <p class="playtime-section-time">Beta v1.0</p>
            </div>

        </div>

        
    </body>

    <script src="./index.js"></script>

</html>
